name: CI

on:
  pull_request:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          coverage: none
          tools: composer:v2

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: npm

      - name: Install Node dependencies
        run: npm ci

      - name: Check code style
        run: composer lint:check

      - name: Run static analysis
        run: composer analyze

      - name: Run test suite
        run: ./vendor/bin/pest --ci --no-coverage

      - name: Build component CSS
        run: ./vendor/bin/testbench basekit:ui:build

      - name: Generate styleguide snapshot
        run: ./vendor/bin/testbench basekit:ui:styleguide

      - name: Verify CSS-doc token sync
        run: bash tools/verify-doc-token-sync.sh
